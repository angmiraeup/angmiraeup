<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mirae Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; }
        .nav { background: #075e54; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-win { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .user-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card.active { background: #e9f5f2; border-left: 5px solid #075e54; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #25d366; } .offline { background: #bbb; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 10px; margin: 5px; border-radius: 6px; max-width: 80%; font-size: 14px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .Admin { align-self: flex-end; background: #dcf8c6; } .User { align-self: flex-start; background: white; }
        /* FIXED BOTTOM BAR */
        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ccc; z-index:1000; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .btn-call { background: #25d366; color: white; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
        .btn-mute { background: #555; color: white; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
        .btn-end { background: #ff3b30; color: white; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
        .send-btn { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        @media (max-width: 768px) { .main { flex-direction: column; } .sidebar { width: 100%; height: 35%; } .chat-win { height: 65%; } }
    </style>
</head>
<body>
<div class="nav"><b>Mirae Admin Control</b></div>
<div class="main">
    <div class="sidebar" id="userList"></div>
    <div class="chat-win">
        <div id="cName" style="padding:10px; background:#fff; font-weight:bold;">Select User</div>
        <div class="msgs" id="chatMsgs"></div>
        <div class="input-bar">
            <button id="callBtn" class="btn-call" onclick="startCall()">📞</button>
            <button id="muteBtn" class="btn-mute" onclick="toggleMute()" style="display:none;">🎙️</button>
            <button id="endBtn" class="btn-end" onclick="adminEndCall()" style="display:none;">📵</button>
            <input type="text" id="aInp" placeholder="Type reply...">
            <button class="send-btn" onclick="sendReply()">Send</button>
        </div>
    </div>
</div>
<script>
const firebaseConfig = { /* Same as index */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const AGORA_ID = "c0d5847270c04ed6b0bb4295ab2390b9";
let activeUid = "", agoraClient, localTrack, isMuted = false;

db.ref('leads').on('value', snap => {
    const list = document.getElementById('userList'); list.innerHTML = "";
    snap.forEach(u => {
        const d = u.val();
        const div = document.createElement('div');
        div.className = `user-card ${activeUid === u.key ? 'active' : ''}`;
        db.ref('status/' + u.key).on('value', s => {
            const dot = s.val() === 'online' ? 'online' : 'offline';
            div.innerHTML = `<span class="dot ${dot}"></span><b>${d.fullName || 'User'}</b><br><small>${u.key}</small>`;
        });
        div.onclick = () => { activeUid = u.key; document.getElementById('cName').innerText = d.fullName; loadChat(u.key); };
        list.appendChild(div);
    });
});

function loadChat(uid) {
    db.ref('chats/' + uid).on('value', snap => {
        const box = document.getElementById('chatMsgs'); box.innerHTML = "";
        snap.forEach(m => {
            const d = m.val();
            const timeStr = d.time ? `<br><small style="font-size:9px;color:#999">${d.time}</small>` : "";
            box.innerHTML += `<div class="msg ${d.sender}">${d.message}${timeStr}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

async function startCall() {
    if(!activeUid) return alert("Select user!");
    document.getElementById('callBtn').style.display = 'none';
    document.getElementById('endBtn').style.display = 'inline-block';
    document.getElementById('muteBtn').style.display = 'inline-block';
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "call", message: "calling..." });
    agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await agoraClient.join(AGORA_ID, "mirae_" + activeUid, null);
    localTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
    await agoraClient.publish([localTrack]);
    agoraClient.on("user-published", async (u, mt) => { await agoraClient.subscribe(u, mt); if (mt === "audio") u.audioTrack.play(); });
}

function toggleMute() {
    isMuted = !isMuted; localTrack.setMuted(isMuted);
    document.getElementById('muteBtn').style.background = isMuted ? "#ff3b30" : "#555";
}

function adminEndCall() {
    document.getElementById('callBtn').style.display = 'inline-block';
    document.getElementById('endBtn').style.display = 'none';
    document.getElementById('muteBtn').style.display = 'none';
    if(localTrack) localTrack.close();
    if(agoraClient) agoraClient.leave();
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "endcall", message: "Ended" });
}

function sendReply() {
    const v = document.getElementById('aInp').value;
    if(v && activeUid) {
        const time = new Date().getHours()+":"+new Date().getMinutes();
        db.ref('chats/' + activeUid).push({ sender: "Admin", message: v, time: time });
        document.getElementById('aInp').value = "";
    }
}
</script>
</body>
</html>
