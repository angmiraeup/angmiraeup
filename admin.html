<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mirae Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; }
        .nav { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-win { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .user-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card.active { background: #e9f5f2; border-left: 5px solid #075e54; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #25d366; } .offline { background: #bbb; }
        .badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: white; margin-left: 5px; background: #e91e63; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 10px; margin: 5px; border-radius: 6px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); background: white; }
        .Admin { align-self: flex-end; background: #dcf8c6; } .User { align-self: flex-start; background: white; }
        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button.action { background: #075e54; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 42px; height: 42px; display:flex; align-items:center; justify-content:center; }
        @media (max-width: 768px) { body { flex-direction: column; } .main { flex-direction: column; } .sidebar { width: 100%; height: 35%; } .chat-win { height: 65%; } }
    </style>
</head>
<body>
<div class="nav"><b>Admin Pro</b><button onclick="downloadExcel()" style="background:#128c7e; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">📥 Excel</button></div>
<div class="main">
    <div class="sidebar" id="userList"></div>
    <div class="chat-win">
        <div id="cName" style="padding:10px; background:#fff; font-weight:bold; color:#075e54;">Select User</div>
        <div class="msgs" id="chatMsgs"></div>
        <div class="input-bar">
            <button onclick="startAdminCall()" style="background:#25d366" class="action">📞</button>
            <button onclick="adminEndCall()" style="background:#ff3b30" class="action">📵</button>
            <input type="file" id="admMedia" style="display:none" onchange="uploadAdminMedia(this)">
            <button onclick="document.getElementById('admMedia').click()" class="action" style="background:#555">📎</button>
            <input type="text" id="aInp" placeholder="Type a message...">
            <button class="action" onclick="sendReply()">➤</button>
        </div>
    </div>
</div>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyDw439IXSmTpustCkIQpRQ7foZ-hc8XiDQ",
    authDomain: "workhatapp.firebaseapp.com",
    databaseURL: "https://workhatapp-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "workhatapp",
    storageBucket: "workhatapp.appspot.com",
    messagingSenderId: "971559169599",
    appId: "1:971559169599:web:082be923ea9782440e128a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const AGORA_ID = "c0d5847270c04ed6b0bb4295ab2390b9";
let activeUid = "", agoraClient, localTrack;

db.ref('leads').on('value', snap => {
    const list = document.getElementById('userList'); list.innerHTML = "";
    snap.forEach(u => {
        const d = u.val();
        const div = document.createElement('div');
        div.className = `user-card ${activeUid === u.key ? 'active' : ''}`;
        db.ref('status/' + u.key).on('value', s => {
            const dot = s.val() === 'online' ? 'online' : 'offline';
            const app = d.installed === 'Yes' ? '<span class="badge">App</span>' : '';
            div.innerHTML = `<span class="dot ${dot}"></span><b>${d.fullName || 'User'}</b> ${app}<br><small>${u.key}</small>`;
        });
        div.onclick = () => { activeUid = u.key; document.getElementById('cName').innerText = d.fullName; loadChat(u.key); };
        list.appendChild(div);
    });
});

function loadChat(uid) {
    db.ref('chats/' + uid).on('value', snap => {
        const box = document.getElementById('chatMsgs'); box.innerHTML = "";
        snap.forEach(m => {
            const d = m.val();
            const div = document.createElement('div'); div.className = `msg ${d.sender}`;
            if(d.type === 'image') div.innerHTML = `<img src="${d.message}" style="width:100%">`;
            else if(d.type === 'video') div.innerHTML = `<video controls style="width:100%"><source src="${d.message}"></video>`;
            else div.innerText = d.message;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function sendReply() {
    const v = document.getElementById('aInp').value;
    if(v && activeUid) { db.ref('chats/' + activeUid).push({ sender: "Admin", message: v }); document.getElementById('aInp').value = ""; }
}

async function startAdminCall() {
    if(!activeUid) return alert("Select lead!");
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "call", message: "calling..." });
    agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await agoraClient.join(AGORA_ID, "mirae_" + activeUid, null);
    localTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
    await agoraClient.publish([localTrack]);
    agoraClient.on("user-published", async (u, mt) => { await agoraClient.subscribe(u, mt); if (mt === "audio") u.audioTrack.play(); });
}

function adminEndCall() {
    if(localTrack) localTrack.close();
    if(agoraClient) agoraClient.leave();
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "endcall", message: "Ended" });
}

async function uploadToCloud(input) {
    if(!activeUid) return alert("Select user!");
    const file = input.files[0];
    const formData = new FormData();
    formData.append('file', file); formData.append('upload_preset', 'mirae_preset');
    const res = await fetch(`https://api.cloudinary.com/v1_1/dqw0atvkp/upload`, {method:'POST', body:formData});
    const data = await res.json();
    const type = file.type.startsWith('video') ? 'video' : 'image';
    await db.ref('chats/' + activeUid).push({ sender: "Admin", message: data.secure_url, type: type });
}

function downloadExcel() {
    // Lead snapshot data to Excel...
}
</script>
</body>
</html>
