<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mirae Pro</title>
    <!-- Isko bhi app banane ke liye manifest joda gaya -->
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; }
        .nav { background: #075e54; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-win { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        .user-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card.active { background: #e9f5f2; border-left: 5px solid #075e54; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #25d366; } .offline { background: #bbb; }
        .badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: white; margin-left: 5px; background: #e91e63; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; padding-bottom: 70px; }
        .msg { padding: 10px; margin: 5px; border-radius: 6px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); background: white; word-wrap: break-word; cursor: pointer; user-select: none; }
        .Admin { align-self: flex-end; background: #dcf8c6; }
        .input-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: #f0f0f0; display: flex; flex-direction: column; border-top: 1px solid #ccc; z-index:1000; }
        .input-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .action { background: #075e54; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 42px; height: 42px; display:flex; align-items:center; justify-content:center; }
        @media (max-width: 768px) { .main { flex-direction: column; } .sidebar { width: 100%; height: 35%; } .chat-win { height: 65%; } }
        
        #replyPreview { display: none; background: #e9eaeb; width: 100%; padding: 10px; border-left: 4px solid #075e54; border-radius: 10px 10px 0 0; position: relative; margin-bottom: 5px; font-size: 13px; color: #555; }
        #replyPreview .close-btn { position: absolute; top: 5px; right: 10px; cursor: pointer; font-weight: bold; font-size: 18px; color: #888; }
        .quoted-msg { background: rgba(0,0,0,0.05); border-left: 4px solid #075e54; padding: 6px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.9; }
        
        .alert-btn { background: #ff9800; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 10px;}
    </style>
</head>
<body>
<div class="nav">
    <b>Admin Control</b>
    <div>
        <!-- 🔥 ADMIN NOTIFICATION BUTTON 🔥 -->
        <button class="alert-btn" id="adminNotifBtn" onclick="enableAdminPush()">🔔 Enable Alerts</button>
    </div>
</div>
<div class="main"><div class="sidebar" id="userList"></div><div class="chat-win">
    <div id="cName" style="padding:10px; background:#fff; font-weight:bold; color:#075e54; border-bottom:1px solid #ddd;">Select Lead</div>
    <div class="msgs" id="chatMsgs"></div>
    <div class="input-bar">
        <div id="replyPreview">
            <div style="font-weight: bold; color: #075e54; margin-bottom: 3px;">Replying to</div>
            <div id="replyText" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
            <span class="close-btn" onclick="cancelReply()">×</span>
        </div>
        <div class="input-row">
            <button id="cBtn" onclick="startAdminCall()" style="background:#25d366" class="action">📞</button>
            <button id="mBtn" onclick="toggleMute()" style="background:#555; display:none;" class="action">🎙️</button>
            <button id="eBtn" onclick="adminEndCall()" style="background:#ff3b30; display:none;" class="action">📵</button>
            <input type="file" id="admMedia" style="display:none" onchange="uploadToCloud(this)">
            <button onclick="document.getElementById('admMedia').click()" class="action" style="background:#555">📎</button>
            <input type="text" id="aInp" placeholder="Message...">
            <button class="action" onclick="sendReply()">➤</button>
        </div>
    </div>
</div></div>
<script>
const firebaseConfig = { apiKey: "AIzaSyDw439IXSmTpustCkIQpRQ7foZ-hc8XiDQ", authDomain: "workhatapp.firebaseapp.com", databaseURL: "https://workhatapp-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "workhatapp", storageBucket: "workhatapp.appspot.com", messagingSenderId: "971559169599", appId: "1:971559169599:web:082be923ea9782440e128a" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), messaging = firebase.messaging();
let activeUid = "", agoraClient, localTrack, isMuted = false, replyingToMsg = null;

// 🔥 ADMIN PUSH SETUP 🔥
async function enableAdminPush() {
    try {
        const perm = await Notification.requestPermission();
        if(perm === 'granted') {
            const registration = await navigator.serviceWorker.register('/sw.js');
            const token = await messaging.getToken({ vapidKey: 'BHI-YBeYDm_GFDyX1mI9NKOcx7qfcnYmrMvU2lrPsK2Kgr5UVnD99A4N0KmoQSihCz13Y28U5zOw07_2_PrY4hI', serviceWorkerRegistration: registration });
            if(token) {
                db.ref('adminConfig').set({ fcm_token: token });
                document.getElementById('adminNotifBtn').style.display = 'none';
                alert("✅ Admin Alerts On! Ab jab bhi koi naya message aayega, aapko notification milega.");
            }
        }
    } catch(e) { alert("Error: " + e.message); }
}

// Check if Admin is already subscribed
db.ref('adminConfig/fcm_token').once('value').then(snap => {
    if(snap.exists() && Notification.permission === 'granted') {
        document.getElementById('adminNotifBtn').style.display = 'none';
    }
});

// 🔥 LINK FIX (External Browser)
function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, `<a href="#" onclick="window.open('$1', '_blank'); return false;" style="color: #0088cc; text-decoration: underline; font-weight: 500;">$1</a>`); }

function setReply(text) { replyingToMsg = text; document.getElementById('replyText').innerText = text.replace(/<[^>]*>?/gm, '').substring(0, 50) + '...'; document.getElementById('replyPreview').style.display = 'block'; document.getElementById('aInp').focus(); }
function cancelReply() { replyingToMsg = null; document.getElementById('replyPreview').style.display = 'none'; }

async function sendFCMPush(uid, title, message, type = "message") {
    const userSnap = await db.ref('leads/' + uid).once('value'); const userData = userSnap.val();
    if(userData && userData.fcm_token) {
        try {
            await fetch("/api/send-push", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: userData.fcm_token, title: title, body: message, type: type }) });
        } catch(e) { console.log("Server Error:", e.message); }
    }
}

// 🔥 WHATSAPP STYLE SORTING (Latest Message Upar) 🔥
db.ref('leads').on('value', snap => {
    const list = document.getElementById('userList'); list.innerHTML = "";
    
    let usersArray = [];
    snap.forEach(u => {
        let d = u.val(); d.key = u.key;
        usersArray.push(d);
    });
    
    // Sort by lastMessageTime (Descending)
    usersArray.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));

    usersArray.forEach(d => {
        const div = document.createElement('div'); div.className = `user-card ${activeUid === d.key ? 'active' : ''}`;
        db.ref('status/' + d.key).on('value', s => {
            const dot = s.val() === 'online' ? 'online' : 'offline';
            const app = d.installed === 'Yes' ? '<span class="badge">App</span>' : '';
            div.innerHTML = `<span class="dot ${dot}"></span><b>${d.fullName || 'User'}</b> ${app}<br><small style="color:#888;">${d.key.substring(0,8)}...</small>`;
        });
        div.onclick = () => { activeUid = d.key; document.getElementById('cName').innerText = d.fullName || 'User'; loadChat(d.key); }; 
        list.appendChild(div);
    });
});

function loadChat(uid) {
    db.ref('chats/' + uid).on('value', snap => {
        const box = document.getElementById('chatMsgs'); box.innerHTML = ""; let lastMsg = null;
        snap.forEach(m => {
            const d = m.val(); lastMsg = d;
            const div = document.createElement('div'); div.className = `msg ${d.sender}`;
            
            div.ondblclick = () => { let txt = d.type === 'image' ? '📷 Image' : (d.type === 'video' ? '🎥 Video' : d.message); setReply(txt); };

            let innerContent = "";
            if(d.replyTo) { innerContent += `<div class="quoted-msg">${d.replyTo.replace(/<[^>]*>?/gm, '').substring(0, 80)}...</div>`; }

            if(d.type === 'image') innerContent += `<img src="${d.message}" style="width:100%">`;
            else if(d.type === 'video') innerContent += `<video controls style="width:100%"><source src="${d.message}"></video>`;
            else { if(d.message.includes('<a ') || d.message.includes('<button') || d.message.includes('<b>')) innerContent += d.message; else innerContent += linkify(d.message); }
            
            div.innerHTML = innerContent; box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
        if(lastMsg && lastMsg.type === 'endcall' && lastMsg.sender === 'User') { document.getElementById('cBtn').style.display='inline-block'; document.getElementById('mBtn').style.display='none'; document.getElementById('eBtn').style.display='none'; if(localTrack) { localTrack.stop(); localTrack.close(); } if(agoraClient) { agoraClient.leave(); } }
    });
}

function sendReply() {
    const v = document.getElementById('aInp').value;
    if(v && activeUid) { 
        let msgObj = { sender: "Admin", message: v };
        if(replyingToMsg) { msgObj.replyTo = replyingToMsg; }
        
        db.ref('chats/' + activeUid).push(msgObj); 
        // Admin msg bhejega to bhi sorting time update hoga
        db.ref('leads/' + activeUid).update({ lastMessageTime: Date.now() });
        sendFCMPush(activeUid, "Support Message", v, "message"); 
        cancelReply(); document.getElementById('aInp').value = ""; 
    }
}

async function startAdminCall() {
    if(!activeUid) return alert("Select lead!");
    document.getElementById('cBtn').style.display='none'; document.getElementById('mBtn').style.display='inline-block'; document.getElementById('eBtn').style.display='inline-block';
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "call", message: "calling..." }); sendFCMPush(activeUid, "📞 Incoming Call", "Mirae Support is calling you...", "call"); 
    agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" }); await agoraClient.join("c0d5847270c04ed6b0bb4295ab2390b9", "mirae_" + activeUid, null);
    localTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true }); localTrack.setEnabled(false); await agoraClient.publish([localTrack]);
    agoraClient.on("user-published", async (u, mt) => { await agoraClient.subscribe(u, mt); if (mt === "audio") u.audioTrack.play(); });
}

function toggleMute() { isMuted = !isMuted; localTrack.setEnabled(isMuted); document.getElementById('mBtn').style.background = isMuted ? "#075e54" : "#ff3b30"; }

function adminEndCall() {
    document.getElementById('cBtn').style.display='inline-block'; document.getElementById('mBtn').style.display='none'; document.getElementById('eBtn').style.display='none';
    if(localTrack) { localTrack.stop(); localTrack.close(); } if(agoraClient) { agoraClient.leave(); }
    db.ref('chats/' + activeUid).push({ sender: "Admin", type: "endcall", message: "Ended" });
}

async function uploadToCloud(input) {
    if(!activeUid) return alert("Lead select!"); const file = input.files[0]; if(!file) return;
    const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', 'mirae_preset');
    const res = await fetch(`https://api.cloudinary.com/v1_1/dqw0atvkp/upload`, {method:'POST', body:formData}); const data = await res.json();
    
    let msgObj = { sender: "Admin", message: data.secure_url, type: (file.type.startsWith('video') ? 'video' : 'image') };
    if(replyingToMsg) msgObj.replyTo = replyingToMsg;
    await db.ref('chats/' + activeUid).push(msgObj);
    db.ref('leads/' + activeUid).update({ lastMessageTime: Date.now() });
    sendFCMPush(activeUid, "New Media Received", "Admin sent a photo/video", "message"); cancelReply();
}
</script>
</body>
</html>
