<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mirae Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; }
        .nav { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-win { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        .user-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card.active { background: #e9f5f2; border-left: 5px solid #075e54; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; padding-bottom: 70px; }
        .msg { padding: 10px; margin: 5px; border-radius: 6px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); background: white; }
        .Admin { align-self: flex-end; background: #dcf8c6; }
        .input-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; background: white; }
        button.action { background: #075e54; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; }
        @media (max-width: 768px) { .main { flex-direction: column; } .sidebar { width: 100%; height: 35%; } .chat-win { height: 65%; } }
    </style>
</head>
<body>
<div class="nav"><b>Admin Control</b><button onclick="downloadExcel()" style="background:#128c7e; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">📥 Excel</button></div>
<div class="main">
    <div class="sidebar" id="userList"></div>
    <div class="chat-win">
        <div id="cName" style="padding:10px; background:#fff; font-weight:bold; color:#075e54; border-bottom:1px solid #ddd;">Select Lead</div>
        <div class="msgs" id="chatMsgs"></div>
        <div class="input-bar">
            <button onclick="sendReply('call')" style="background:#25d366" class="action">📞</button>
            <input type="text" id="aInp" placeholder="Type a reply...">
            <button class="action" onclick="sendReply('msg')">Send</button>
        </div>
    </div>
</div>
<script>
const firebaseConfig = { apiKey: "AIzaSyDw439IXSmTpustCkIQpRQ7foZ-hc8XiDQ", authDomain: "workhatapp.firebaseapp.com", databaseURL: "https://workhatapp-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "workhatapp", storageBucket: "workhatapp.appspot.com", messagingSenderId: "971559169599", appId: "1:971559169599:web:082be923ea9782440e128a" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ONESIGNAL_APP_ID = "c029d484-4048-4dfd-b88f-b6080f1cbb84";
const ONESIGNAL_REST_KEY = "os_v2_org_2x5pz2r2n5csbmgp42xep5e5ur22e5wh5mvuziftfk5flbxatxo3n664ml4iyhei7dygyvt6ev7b2epajcx4w4vn56j74xsljlnugva";

let activeUid = "";

db.ref('leads').on('value', snap => {
    const list = document.getElementById('userList'); list.innerHTML = "";
    snap.forEach(u => {
        const d = u.val();
        const div = document.createElement('div');
        div.className = `user-card ${activeUid === u.key ? 'active' : ''}`;
        div.innerHTML = `<b>${d.fullName || 'User'}</b><br><small>${u.key}</small>`;
        div.onclick = () => { activeUid = u.key; document.getElementById('cName').innerText = d.fullName || u.key; loadChat(u.key); };
        list.appendChild(div);
    });
});

function loadChat(uid) {
    db.ref('chats/' + uid).on('value', snap => {
        const box = document.getElementById('chatMsgs'); box.innerHTML = "";
        snap.forEach(m => { box.innerHTML += `<div class="msg ${m.val().sender}">${m.val().message}</div>`; });
        box.scrollTop = box.scrollHeight;
    });
}

async function sendReply(mode) {
    const v = document.getElementById('aInp').value;
    if(!activeUid) return alert("Select lead!");

    let msg = (mode === 'call') ? "calling..." : v;
    let type = (mode === 'call') ? "call" : "text";

    // Firebase Update
    db.ref('chats/' + activeUid).push({ sender: "Admin", message: msg, type: type });

    // OneSignal Push
    fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8", "Authorization": "Basic " + ONESIGNAL_REST_KEY },
        body: JSON.stringify({
            app_id: ONESIGNAL_APP_ID,
            include_external_user_ids: [activeUid],
            contents: { "en": mode === 'call' ? "Incoming Voice Call..." : msg },
            headings: { "en": "Mirae Support" }
        })
    });

    document.getElementById('aInp').value = "";
}

function downloadExcel() {
    // Logic as before
}
</script>
</body>
</html>
