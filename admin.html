<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; }
        .nav { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-win { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .user-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card.active { background: #e9f5f2; border-left: 5px solid #075e54; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 4px; border-radius: 6px; max-width: 80%; font-size: 14px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .Admin { align-self: flex-end; background: #dcf8c6; }
        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button.action { background: #075e54; color: white; border: none; padding: 10px; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; }
        @media (max-width: 768px) { .main { flex-direction: column; } .sidebar { width: 100%; height: 35%; } .chat-win { height: 65%; } }
    </style>
</head>
<body>
<div class="nav"><b>Admin Control</b><button onclick="downloadExcel()" style="background:#128c7e; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">📥 Excel</button></div>
<div class="main"><div class="sidebar" id="userList"></div><div class="chat-win">
    <div id="cName" style="padding:10px; background:#fff; font-weight:bold; color:#075e54;">Select Lead</div>
    <div class="msgs" id="chatMsgs"></div>
    <div class="input-bar">
        <button onclick="alert('Call Triggered')" style="background:#25d366" class="action">📞</button>
        <input type="file" id="admFile" style="display:none" onchange="uploadToCloud(this)">
        <button onclick="document.getElementById('admFile').click()" class="action" style="background:#555">📎</button>
        <input type="text" id="aInp" placeholder="Reply...">
        <button class="action" onclick="sendReply()">➤</button>
    </div>
</div></div>
<script>
const firebaseConfig = { /* Same as yours */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let activeUid = ""; let allLeads = [];

db.ref('leads').on('value', snap => {
    const list = document.getElementById('userList'); list.innerHTML = ""; leads = [];
    snap.forEach(u => {
        const d = u.val(); leads.push(d);
        const div = document.createElement('div');
        div.className = `user-card ${activeUid === u.key ? 'active' : ''}`;
        div.innerHTML = `<b>${d.fullName || 'User'}</b><br><small>${u.key}</small>`;
        div.onclick = () => { activeUid = u.key; document.getElementById('cName').innerText = d.fullName; loadChat(u.key); };
        list.appendChild(div);
    });
});

function loadChat(uid) {
    db.ref('chats/' + uid).on('value', snap => {
        const box = document.getElementById('chatMsgs'); box.innerHTML = "";
        snap.forEach(m => { box.innerHTML += `<div class="msg ${m.val().sender}">${m.val().message}</div>`; });
        box.scrollTop = box.scrollHeight;
    });
}

function sendReply() {
    const v = document.getElementById('aInp').value;
    if(v && activeUid) { db.ref('chats/' + activeUid).push({ sender: "Admin", message: v }); document.getElementById('aInp').value = ""; }
}
</script>
</body>
</html>
